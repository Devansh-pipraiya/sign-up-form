<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🙋‍♂️</text></svg>">
    <link rel="stylesheet" href="/style.css">
    <title>Sign-up Form</title>
</head>
<body>
    <aside>
        <div class="title"><img src="/assets/odin-lined.png" height="100px" width="auto" class="logo">ODIN</div>
        <img src="/assets/banner.jpg" height="979px" width="679px" class="banner">
    </aside>
    <main>
        <form>                
            <h2>Demo Form | Not a real Service! <br>You <em>know</em> you need something like this in your life <br>Sign up <em>now</em> to get Started</h2>
            <h2>Nothing is getting tracked</h2>
            <fieldset>
                <legend>Join ODIN Club</legend>
                <h2>Let's do this!</h2>
                <br>
                <div>
                    <label>FIRST NAME<input type="text"  name="first-name" ></label>
                    <label>LAST NAME<input type="text" name="last-name"></label>
                </div>
                <div>
                    <label>EMAIL<input type="email" name="email"></label>
                    <label>PHONE NUMBER<input type="number"></label>
                </div>
                <div>
                    <label>PASSWORD<input type="password" required></label>
                    <label>CONFIRM PASSWORD<input type="password" required></label>
                </div>
            </fieldset>
            <button type="submit">Create Account</button>
            <div>Already have an account? <span>Log in</span></div>
        </form>
    </main>
    
</body>
</html>
