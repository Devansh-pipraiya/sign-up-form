<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🙋‍♂️</text></svg>">
    <link rel="stylesheet" href="/style.css">
    <title>Sign-up Form</title>
</head>
<body>
    <aside>
        <div class="title"><img src="/assets/odin-lined.png" height="100px" width="auto" class="logo">ODIN</div>
        <img src="/assets/banner.jpg" height="1366" width="736" class="banner">
    </aside>
    <main>
        <form>                
            <h2>Simple Demo Form | Not a real Service</h2>
            <h3>Nothing is getting tracked</h3>
            <fieldset>
                <legend>Join ODIN Club</legend>
                <label>FIRST NAME<input type="text"  name="first-name" required></label>
                <label>LAST NAME<input type="text" name="last-name"></label>
                <label>EMAIL<input type="email" name="email"></label>
                <label>PHONE NUMBER<input type="number"></label>
                <label>PASSWORD<input type="password"></label>
                <label>CONFIRM PASSWORD<input type="password"></label>
            </fieldset>
            <button type="submit">Create Account</button>
        </form>
    </main>
    
</body>
</html>
